<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 웹 메모장</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button#add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button#add-btn:hover {
            background-color: var(--primary-hover);
        }

        button#add-btn:active {
            transform: scale(0.95);
        }

        .memo-list {
            list-style: none;
            padding: 0;
        }

        .memo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }

        .memo-text {
            font-size: 0.95rem;
            color: var(--text-main);
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .edit-btn, .delete-btn {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .edit-btn { background: #eef2ff; color: var(--primary); }
        .delete-btn { background: #fee2e2; color: var(--danger); }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>My Notepad!</h1>
        </header>

        <div class="input-group">
            <input type="text" id="memo-input" placeholder="메모를 입력하세요..." autocomplete="off">
            <button type="button" id="add-btn" onclick="addMemo()">추가</button>
        </div>

        <ul id="memo-list" class="memo-list"></ul>

        <div id="empty-msg" class="empty-state">메모가 없습니다. 새로운 메모를 추가해보세요!</div>
    </div>

    <script>
        // 1. 에러 캡처
        window.onerror = function(m, u, l) {
            alert("에러 발생: " + m + " (라인: " + l + ")");
        };

        const SUPABASE_URL = CONFIG.SUPABASE_URL;
        const SUPABASE_KEY = CONFIG.SUPABASE_KEY;
        let supabaseClient = null;

        // 초기화
        window.onload = function() {
            console.log("App ready");
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                loadFromDB();
            }
            updateUI();
        };

        function updateUI() {
            const list = document.getElementById('memo-list');
            const msg = document.getElementById('empty-msg');
            msg.style.display = list.children.length === 0 ? 'block' : 'none';
        }

        async function loadFromDB() {
            if (!supabaseClient) return;
            const { data } = await supabaseClient.from('memos').select('*').order('created_at', { ascending: true });
            if (data) {
                const list = document.getElementById('memo-list');
                list.innerHTML = '';
                data.forEach(m => appendMemoToUI(m.id, m.content));
                updateUI();
            }
        }

        function appendMemoToUI(id, text) {
            const list = document.getElementById('memo-list');
            const li = document.createElement('li');
            li.className = 'memo-item';
            li.setAttribute('data-id', id);
            li.innerHTML = `
                <span class="memo-text">${text}</span>
                <div class="btn-group">
                    <button type="button" class="edit-btn" onclick="editMemo(this)">수정</button>
                    <button type="button" class="delete-btn" onclick="deleteMemo(this)">삭제</button>
                </div>
            `;
            list.appendChild(li);
        }

        function addMemo() {
            const input = document.getElementById('memo-input');
            const text = input.value.trim();
            if (!text) return;

            // 1. 즉시 화면 추가
            const tempId = 'temp-' + Date.now();
            appendMemoToUI(tempId, text);
            input.value = '';
            updateUI();

            // 2. DB 저장
            if (supabaseClient) {
                supabaseClient.from('memos').insert([{ content: text }]).select().then(({data, error}) => {
                    if (error) console.error("DB Save Error", error);
                    if (data && data[0]) {
                        const li = document.querySelector(`[data-id="${tempId}"]`);
                        if (li) li.setAttribute('data-id', data[0].id);
                    }
                });
            }
        }

        function deleteMemo(btn) {
            const li = btn.closest('.memo-item');
            const id = li.getAttribute('data-id');
            li.remove();
            updateUI();

            if (supabaseClient && !id.startsWith('temp')) {
                supabaseClient.from('memos').delete().eq('id', id).then();
            }
        }

        function editMemo(btn) {
            const li = btn.closest('.memo-item');
            const span = li.querySelector('.memo-text');
            const id = li.getAttribute('data-id');
            const oldText = span.textContent;
            const newText = prompt('수정할 내용을 입력하세요:', oldText);
            
            if (newText && newText !== oldText) {
                span.textContent = newText;
                if (supabaseClient && !id.startsWith('temp')) {
                    supabaseClient.from('memos').update({ content: newText }).eq('id', id).then();
                }
            }
        }
    </script>
</body>

</html>
