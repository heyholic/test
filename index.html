<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 웹 메모장</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button#add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button#add-btn:hover {
            background-color: var(--primary-hover);
        }

        button#add-btn:active {
            transform: scale(0.95);
        }

        .memo-list {
            list-style: none;
        }

        .memo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
            transition: transform 0.2s;
        }

        .memo-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .memo-text {
            font-size: 0.95rem;
            color: var(--text-main);
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: var(--danger);
            background-color: #fee2e2;
        }

        .edit-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn:hover {
            color: var(--primary);
            background-color: #eef2ff;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .edit-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            margin-right: 12px;
        }

        .save-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .cancel-btn {
            background-color: var(--border);
            color: var(--text-muted);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 4px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.9rem;
        }

        /* Adding a simple loading indicator style */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>My Notepad!</h1>
        </header>

        <div class="input-group">
            <input type="text" id="memo-input" placeholder="메모를 입력하세요..." autocomplete="off">
            <button type="button" id="add-btn">추가</button>
        </div>

        <ul id="memo-list" class="memo-list">
            <!-- 메모가 여기에 추가됩니다 -->
        </ul>

        <div id="empty-msg" class="empty-state">메모가 없습니다. 새로운 메모를 추가해보세요!</div>
    </div>

    <script>
        // 전역 변수 설정
        let supabase;
        const SUPABASE_URL = 'https://jaqwphkqtuahfrdxaemu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphcXdwaGtxdHVhaGZyZHhhZW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTc5NTcsImV4cCI6MjA5NDI5Mzk1N30.J_xHyh135Kk-1RbP86N43NgeUSJPmJTXiIZ-a4gf15o';

        const memoInput = document.getElementById('memo-input');
        const addBtn = document.getElementById('add-btn');
        const memoList = document.getElementById('memo-list');
        const emptyMsg = document.getElementById('empty-msg');

        // 초기화 함수
        function init() {
            console.log('App initializing...');
            
            // 1. 이벤트 리스너 먼저 등록 (가장 중요)
            addBtn.addEventListener('click', addMemo);
            memoInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addMemo();
            });

            // 2. Supabase 초기화
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log('Supabase initialized successfully');
                    loadMemos(); // 초기 데이터 로드
                } else {
                    throw new Error('Supabase library not found. CDN 로드 확인 필요.');
                }
            } catch (err) {
                console.error('Initialization error:', err);
                emptyMsg.textContent = '서비스 연결에 실패했습니다: ' + err.message;
            }

            updateEmptyState();
        }

        function updateEmptyState() {
            if (memoList.children.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
            }
        }

        async function loadMemos() {
            if (!supabase) return;
            
            console.log('Loading memos...');
            emptyMsg.textContent = '불러오는 중...';
            
            try {
                const { data, error } = await supabase
                    .from('memos')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                console.log('Loaded memos:', data);
                memoList.innerHTML = '';
                data.forEach(memo => {
                    createMemoElement(memo.id, memo.content);
                });
                emptyMsg.textContent = '메모가 없습니다. 새로운 메모를 추가해보세요!';
            } catch (error) {
                console.error('Error loading memos:', error);
                emptyMsg.textContent = '데이터를 불러오지 못했습니다. 테이블 설정을 확인해주세요.';
            } finally {
                updateEmptyState();
            }
        }

        async function addMemo() {
            const text = memoInput.value.trim();
            if (text === '') return;

            if (!supabase) {
                alert('데이터베이스가 연결되지 않았습니다.');
                return;
            }

            console.log('Adding memo:', text);
            addBtn.disabled = true;
            try {
                const { data, error } = await supabase
                    .from('memos')
                    .insert([{ content: text }])
                    .select();

                if (error) throw error;

                if (data && data.length > 0) {
                    createMemoElement(data[0].id, data[0].content);
                    memoInput.value = '';
                    memoInput.focus();
                }
            } catch (err) {
                console.error('Add memo error:', err);
                alert('메모 저장 실패: ' + (err.message || '알 수 없는 오류'));
            } finally {
                addBtn.disabled = false;
                updateEmptyState();
            }
        }

        function createMemoElement(id, text) {
            const li = document.createElement('li');
            li.className = 'memo-item';
            li.dataset.id = id;
            renderMemoContent(li, text);
            memoList.appendChild(li);
        }

        function renderMemoContent(li, text) {
            li.innerHTML = `
                <span class="memo-text">${escapeHtml(text)}</span>
                <div class="btn-group">
                    <button type="button" class="edit-btn" title="수정">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                    </button>
                    <button type="button" class="delete-btn" title="삭제">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            `;

            li.querySelector('.edit-btn').addEventListener('click', () => enterEditMode(li, text));
            li.querySelector('.delete-btn').addEventListener('click', () => deleteMemo(li));
        }

        async function deleteMemo(li) {
            const id = li.dataset.id;
            if (!supabase) return;

            li.classList.add('loading');
            try {
                const { error } = await supabase.from('memos').delete().eq('id', id);
                if (error) throw error;

                li.style.opacity = '0';
                li.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    li.remove();
                    updateEmptyState();
                }, 200);
            } catch (err) {
                console.error('Delete error:', err);
                alert('삭제 실패');
                li.classList.remove('loading');
            }
        }

        function enterEditMode(li, currentText) {
            const id = li.dataset.id;
            li.innerHTML = `
                <input type="text" class="edit-input" value="${escapeHtml(currentText)}">
                <div class="btn-group">
                    <button type="button" class="save-btn">저장</button>
                    <button type="button" class="cancel-btn">취소</button>
                </div>
            `;

            const input = li.querySelector('.edit-input');
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);

            const save = async () => {
                const newText = input.value.trim();
                if (newText === '' || !supabase) return;
                
                li.classList.add('loading');
                try {
                    const { error } = await supabase.from('memos').update({ content: newText }).eq('id', id);
                    if (error) throw error;
                    exitEditMode(li, newText);
                } catch (err) {
                    console.error('Update error:', err);
                    alert('수정 실패');
                    li.classList.remove('loading');
                }
            };

            const cancel = () => exitEditMode(li, currentText);

            li.querySelector('.save-btn').addEventListener('click', save);
            li.querySelector('.cancel-btn').addEventListener('click', cancel);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') cancel();
            });
        }

        function exitEditMode(li, text) {
            li.classList.remove('loading');
            renderMemoContent(li, text);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 실행
        init();

    </script>

</body>

</html>
