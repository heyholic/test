<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 웹 메모장</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button#add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button#add-btn:hover {
            background-color: var(--primary-hover);
        }

        button#add-btn:active {
            transform: scale(0.95);
        }

        .memo-list {
            list-style: none;
        }

        .memo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
            transition: transform 0.2s;
        }

        .memo-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .memo-text {
            font-size: 0.95rem;
            color: var(--text-main);
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: var(--danger);
            background-color: #fee2e2;
        }

        .edit-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn:hover {
            color: var(--primary);
            background-color: #eef2ff;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .edit-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            margin-right: 12px;
        }

        .save-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .cancel-btn {
            background-color: var(--border);
            color: var(--text-muted);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 4px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>My Notepad!</h1>
        </header>

        <div class="input-group">
            <input type="text" id="memo-input" placeholder="메모를 입력하세요..." autocomplete="off">
            <button id="add-btn">추가</button>
        </div>

        <ul id="memo-list" class="memo-list">
            <!-- 메모가 여기에 추가됩니다 -->
        </ul>

        <div id="empty-msg" class="empty-state">메모가 없습니다. 새로운 메모를 추가해보세요!</div>
    </div>

    <script>
        const memoInput = document.getElementById('memo-input');
        const addBtn = document.getElementById('add-btn');
        const memoList = document.getElementById('memo-list');
        const emptyMsg = document.getElementById('empty-msg');

        function updateEmptyState() {
            if (memoList.children.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
            }
        }

        function addMemo() {
            const text = memoInput.value.trim();
            if (text === '') return;

            createMemoElement(text);
            memoInput.value = '';
            memoInput.focus();
            saveMemos();
        }

        function createMemoElement(text) {
            const li = document.createElement('li');
            li.className = 'memo-item';
            renderMemoContent(li, text);
            memoList.appendChild(li);
            updateEmptyState();
        }

        function renderMemoContent(li, text) {
            li.innerHTML = `
                <span class="memo-text">${escapeHtml(text)}</span>
                <div class="btn-group">
                    <button class="edit-btn" title="수정">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                    </button>
                    <button class="delete-btn" title="삭제">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            `;

            li.querySelector('.edit-btn').addEventListener('click', () => enterEditMode(li, text));
            li.querySelector('.delete-btn').addEventListener('click', () => deleteMemo(li));
        }

        function deleteMemo(li) {
            li.style.opacity = '0';
            li.style.transform = 'scale(0.95)';
            setTimeout(() => {
                li.remove();
                updateEmptyState();
                saveMemos(); // 삭제 후 저장 필수!
            }, 200);
        }

        function enterEditMode(li, currentText) {
            li.innerHTML = `
                <input type="text" class="edit-input" value="${escapeHtml(currentText)}">
                <div class="btn-group">
                    <button class="save-btn">저장</button>
                    <button class="cancel-btn">취소</button>
                </div>
            `;

            const input = li.querySelector('.edit-input');
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);

            const save = () => {
                const newText = input.value.trim();
                if (newText === '') return;
                exitEditMode(li, newText);
                saveMemos();
            };

            const cancel = () => exitEditMode(li, currentText);

            li.querySelector('.save-btn').addEventListener('click', save);
            li.querySelector('.cancel-btn').addEventListener('click', cancel);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') cancel();
            });
        }

        function exitEditMode(li, text) {
            renderMemoContent(li, text);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveMemos() {
            const memos = [];
            document.querySelectorAll('.memo-text').forEach(span => {
                memos.push(span.textContent);
            });
            localStorage.setItem('simple-notepad-memos', JSON.stringify(memos));
        }

        function loadMemos() {
            const saved = localStorage.getItem('simple-notepad-memos');
            if (saved) {
                const memos = JSON.parse(saved);
                memos.forEach(text => createMemoElement(text));
            }
        }

        addBtn.addEventListener('click', addMemo);
        memoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addMemo();
        });

        // 초기 실행
        loadMemos();
        updateEmptyState();
    </script>

</body>

</html>
