<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 웹 메모장</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button#add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button#add-btn:hover {
            background-color: var(--primary-hover);
        }

        button#add-btn:active {
            transform: scale(0.95);
        }

        .memo-list {
            list-style: none;
        }

        .memo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
            transition: transform 0.2s;
        }

        .memo-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .memo-text {
            font-size: 0.95rem;
            color: var(--text-main);
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: var(--danger);
            background-color: #fee2e2;
        }

        .edit-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn:hover {
            color: var(--primary);
            background-color: #eef2ff;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .edit-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            margin-right: 12px;
        }

        .save-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .cancel-btn {
            background-color: var(--border);
            color: var(--text-muted);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 4px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.9rem;
        }

        /* Adding a simple loading indicator style */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>My Notepad!</h1>
        </header>

        <div class="input-group">
            <input type="text" id="memo-input" placeholder="메모를 입력하세요..." autocomplete="off">
            <button type="button" id="add-btn">추가</button>
        </div>

        <ul id="memo-list" class="memo-list">
            <!-- 메모가 여기에 추가됩니다 -->
        </ul>

        <div id="empty-msg" class="empty-state">메모가 없습니다. 새로운 메모를 추가해보세요!</div>
    </div>

    <script>
        // 0. 전역 에러 핸들러 (디버깅용)
        window.onerror = function(msg, url, line) {
            const errBox = document.getElementById('empty-msg');
            if (errBox) {
                errBox.style.color = 'red';
                errBox.innerHTML = `자바스크립트 오류: ${msg} <br> (라인: ${line})`;
            }
            return false;
        };

        // 전역 변수
        let supabase;
        const SUPABASE_URL = 'https://jaqwphkqtuahfrdxaemu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphcXdwaGtxdHVhaGZyZHhhZW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTc5NTcsImV4cCI6MjA5NDI5Mzk1N30.J_xHyh135Kk-1RbP86N43NgeUSJPmJTXiIZ-a4gf15o';

        const memoInput = document.getElementById('memo-input');
        const addBtn = document.getElementById('add-btn');
        const memoList = document.getElementById('memo-list');
        const emptyMsg = document.getElementById('empty-msg');

        function init() {
            console.log('App init start');
            
            // 버튼 이벤트 연결
            addBtn.onclick = addMemo;
            memoInput.onkeydown = (e) => { if (e.key === 'Enter') addMemo(); };

            // Supabase 시도
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    loadMemos();
                } else {
                    console.error('Supabase SDK missing');
                }
            } catch (e) {
                console.error('Supabase init failed', e);
            }
            updateEmptyState();
        }

        function updateEmptyState() {
            emptyMsg.style.display = memoList.children.length === 0 ? 'block' : 'none';
        }

        function createMemoElement(id, text) {
            const li = document.createElement('li');
            li.className = 'memo-item';
            li.dataset.id = id;
            li.innerHTML = `
                <span class="memo-text">${text}</span>
                <div class="btn-group">
                    <button type="button" class="edit-btn">수정</button>
                    <button type="button" class="delete-btn">삭제</button>
                </div>
            `;
            
            // 삭제 버튼 이벤트
            li.querySelector('.delete-btn').onclick = () => {
                li.remove();
                updateEmptyState();
                if (supabase && !id.toString().startsWith('temp')) {
                    supabase.from('memos').delete().eq('id', id).then();
                }
            };

            // 수정 버튼 이벤트
            li.querySelector('.edit-btn').onclick = () => {
                const newText = prompt('수정할 내용을 입력하세요:', text);
                if (newText && newText !== text) {
                    li.querySelector('.memo-text').textContent = newText;
                    if (supabase && !id.toString().startsWith('temp')) {
                        supabase.from('memos').update({ content: newText }).eq('id', id).then();
                    }
                }
            };

            memoList.appendChild(li);
        }

        async function loadMemos() {
            if (!supabase) return;
            try {
                const { data, error } = await supabase.from('memos').select('*').order('created_at', { ascending: true });
                if (data) {
                    memoList.innerHTML = '';
                    data.forEach(m => createMemoElement(m.id, m.content));
                    updateEmptyState();
                }
            } catch (e) {
                console.error('Load failed', e);
            }
        }

        function addMemo() {
            const text = memoInput.value.trim();
            if (!text) return;

            console.log('Add button clicked:', text);

            // 1. 즉시 화면 추가
            const tempId = 'temp-' + Date.now();
            createMemoElement(tempId, text);
            
            // 2. 입력창 비우기
            memoInput.value = '';
            updateEmptyState();

            // 3. DB 저장 (조용히 처리)
            if (supabase) {
                supabase.from('memos').insert([{ content: text }]).select().then(({data}) => {
                    if (data && data[0]) {
                        const li = memoList.querySelector(`[data-id="${tempId}"]`);
                        if (li) li.dataset.id = data[0].id;
                    }
                });
            }
        }

        // 실행
        init();
    </script>
</body>
</html>
